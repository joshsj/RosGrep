name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-[a-z0-9]+"

jobs:
  build-and-publish:
    runs-on: ubuntu-slim
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set package version
        run: |
          VERSION="${GITHUB_REF_NAME:1}"
          echo Parsed version $VERSION
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build package
        run: dotnet pack src/RosGrep.Cli -p:Version=${VERSION}

      - name: Authenticate with NuGet
        id: auth
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: NuGet push
        run: >
          dotnet nuget push artifacts/package/release/RosGrep.Cli.${VERSION}.nupkg
          --api-key ${{ steps.auth.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
 